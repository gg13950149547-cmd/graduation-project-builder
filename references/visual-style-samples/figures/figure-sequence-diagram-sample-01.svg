<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1200" viewBox="0 0 1400 1200">
  <defs>
    <style>
      .label { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 28px; fill: #111; }
      .small { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 22px; fill: #111; }
      .boxtext { font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 26px; fill: #111; }
      .thin { stroke: #222; stroke-width: 2.2; fill: none; }
      .life { stroke: #7d7d7d; stroke-width: 1.6; stroke-dasharray: 9 8; }
      .frame { stroke: #222; stroke-width: 3; fill: none; }
      .headbox { fill: #eef0f6; stroke: #666; stroke-width: 2; rx: 8; ry: 8; }
      .act { fill: #f3f3f3; stroke: #777; stroke-width: 1.6; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,4 L0,8 z" fill="#222"/>
    </marker>
  </defs>

  <!-- actors / participants -->
  <g>
    <!-- user actor -->
    <circle cx="90" cy="70" r="16" class="thin"/>
    <line x1="90" y1="86" x2="90" y2="130" class="thin"/>
    <line x1="66" y1="104" x2="114" y2="104" class="thin"/>
    <line x1="90" y1="130" x2="68" y2="164" class="thin"/>
    <line x1="90" y1="130" x2="112" y2="164" class="thin"/>
    <text x="58" y="198" class="label">用户</text>

    <rect x="260" y="100" width="140" height="54" class="headbox"/>
    <text x="300" y="136" class="boxtext">前端页面</text>

    <rect x="660" y="100" width="140" height="54" class="headbox"/>
    <text x="700" y="136" class="boxtext">后端服务</text>

    <rect x="980" y="100" width="180" height="54" class="headbox"/>
    <text x="1010" y="136" class="boxtext">语音识别接口</text>

    <rect x="1260" y="100" width="110" height="54" class="headbox"/>
    <text x="1296" y="136" class="boxtext">数据库</text>

    <!-- lifelines -->
    <line x1="90" y1="210" x2="90" y2="1110" class="life"/>
    <line x1="330" y1="154" x2="330" y2="1110" class="life"/>
    <line x1="730" y1="154" x2="730" y2="1110" class="life"/>
    <line x1="1070" y1="154" x2="1070" y2="1110" class="life"/>
    <line x1="1315" y1="154" x2="1315" y2="1110" class="life"/>
  </g>

  <!-- alt frame -->
  <rect x="40" y="360" width="1290" height="700" class="frame"/>
  <path d="M40 360 H150 L170 382 L150 404 H40 Z" fill="white" stroke="#222" stroke-width="3"/>
  <text x="64" y="393" class="boxtext">alt</text>

  <line x1="40" y1="540" x2="1330" y2="540" stroke="#666" stroke-width="1.4" stroke-dasharray="7 6"/>
  <text x="58" y="455" class="small">[文件校验不通过]</text>
  <text x="58" y="575" class="small">[文件校验通过]</text>

  <!-- messages before alt -->
  <line x1="102" y1="230" x2="320" y2="230" class="thin" marker-end="url(#arrow)"/>
  <text x="108" y="216" class="small">选择并上传音频文件</text>

  <line x1="340" y1="300" x2="718" y2="300" class="thin" marker-end="url(#arrow)"/>
  <text x="420" y="286" class="small">提交音频文件 + 格式校验请求</text>

  <rect x="706" y="334" width="28" height="78" class="act"/>
  <line x1="718" y1="370" x2="736" y2="370" class="thin" marker-end="url(#arrow)"/>
  <rect x="736" y="349" width="84" height="42" class="thin"/>
  <text x="832" y="378" class="small">校验文件格式/重复状态</text>

  <!-- alt branch 1 -->
  <line x1="718" y1="448" x2="342" y2="448" class="thin" marker-end="url(#arrow)"/>
  <text x="472" y="434" class="small">返回校验失败提示</text>

  <line x1="320" y1="495" x2="102" y2="495" class="thin" marker-end="url(#arrow)"/>
  <text x="122" y="481" class="small">展示异常提示信息</text>

  <!-- alt branch 2 -->
  <line x1="730" y1="620" x2="1303" y2="620" class="thin" marker-end="url(#arrow)"/>
  <text x="748" y="606" class="small">写入任务信息（状态：等待）</text>

  <line x1="718" y1="684" x2="342" y2="684" class="thin" marker-end="url(#arrow)"/>
  <text x="468" y="670" class="small">返回上传成功响应</text>

  <line x1="320" y1="742" x2="102" y2="742" class="thin" marker-end="url(#arrow)"/>
  <text x="122" y="728" class="small">展示上传成功提示</text>

  <line x1="742" y1="812" x2="1058" y2="812" class="thin" marker-end="url(#arrow)"/>
  <text x="782" y="798" class="small">提交音频识别请求</text>

  <line x1="1058" y1="868" x2="742" y2="868" class="thin" marker-end="url(#arrow)"/>
  <text x="820" y="854" class="small">返回语音转文字结果</text>

  <line x1="742" y1="926" x2="760" y2="926" class="thin" marker-end="url(#arrow)"/>
  <rect x="760" y="905" width="130" height="42" class="thin"/>
  <text x="902" y="934" class="small">提取诈骗关键信息</text>

  <line x1="730" y1="994" x2="1303" y2="994" class="thin" marker-end="url(#arrow)"/>
  <text x="744" y="980" class="small">更新任务状态（完成）+ 存储识别/提取结果</text>

  <line x1="742" y1="1042" x2="1303" y2="1042" class="thin" marker-end="url(#arrow)"/>
  <text x="842" y="1028" class="small">请求任务详情数据</text>

  <line x1="1303" y1="1088" x2="742" y2="1088" class="thin" marker-end="url(#arrow)"/>
  <text x="880" y="1074" class="small">返回任务 + 提取信息数据</text>

  <line x1="718" y1="1138" x2="102" y2="1138" class="thin" marker-end="url(#arrow)"/>
  <text x="118" y="1124" class="small">展示任务详情 + 统计数据</text>
</svg>
