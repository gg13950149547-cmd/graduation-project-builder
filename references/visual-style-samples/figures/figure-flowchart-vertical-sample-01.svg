<svg xmlns="http://www.w3.org/2000/svg" width="768" height="1080" viewBox="0 0 768 1080">
  <defs>
    <style>
      .outline { fill: #ffffff; stroke: #333333; stroke-width: 5; stroke-linejoin: round; }
      .line { fill: none; stroke: #333333; stroke-width: 5; stroke-linecap: square; stroke-linejoin: round; }
      .label { font-family: "SimSun", "Songti SC", serif; font-size: 32px; fill: #222222; text-anchor: middle; dominant-baseline: middle; }
      .branch { font-family: "SimSun", "Songti SC", serif; font-size: 28px; fill: #222222; text-anchor: middle; dominant-baseline: middle; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#333333" />
    </marker>
  </defs>

  <rect class="outline" x="268" y="42" rx="34" ry="34" width="232" height="92" />
  <text class="label" x="384" y="88">开始</text>

  <line class="line" x1="384" y1="134" x2="384" y2="248" marker-end="url(#arrow)" />

  <polygon class="outline" points="384,248 520,356 384,464 248,356" />
  <text class="label" x="384" y="356">判断条件</text>

  <line class="line" x1="248" y1="356" x2="140" y2="356" />
  <line class="line" x1="140" y1="356" x2="140" y2="480" marker-end="url(#arrow)" />
  <text class="branch" x="112" y="416">真</text>

  <line class="line" x1="520" y1="356" x2="628" y2="356" />
  <line class="line" x1="628" y1="356" x2="628" y2="480" marker-end="url(#arrow)" />
  <text class="branch" x="656" y="416">假</text>

  <rect class="outline" x="74" y="480" width="132" height="126" />
  <text class="label" x="140" y="543">①</text>

  <rect class="outline" x="562" y="480" width="132" height="126" />
  <text class="label" x="628" y="543">②</text>

  <line class="line" x1="140" y1="606" x2="140" y2="730" />
  <line class="line" x1="628" y1="606" x2="628" y2="730" />
  <line class="line" x1="140" y1="730" x2="384" y2="730" />
  <line class="line" x1="628" y1="730" x2="384" y2="730" />
  <line class="line" x1="384" y1="730" x2="384" y2="812" marker-end="url(#arrow)" />

  <rect class="outline" x="280" y="812" width="208" height="144" />
  <text class="label" x="384" y="884">③</text>

  <line class="line" x1="384" y1="956" x2="384" y2="1032" marker-end="url(#arrow)" />

  <rect class="outline" x="268" y="996" rx="34" ry="34" width="232" height="78" />
  <text class="label" x="384" y="1034">结束</text>
</svg>
